# Pre-commit hooks for the Rust workspace (rust/).
#
# These are intentionally kept separate from the repository-root
# .pre-commit-config.yaml so the Python and Rust toolchains stay decoupled.
# They are the Rust analogs of the Python hooks (ruff format -> cargo fmt,
# ruff check -> cargo clippy, pytest -> cargo test).
#
# Usage (from the repository root):
#   pre-commit run --all-files --config rust/.pre-commit-config.yaml
#
# Install as the active git hook (see rust/CONTRIBUTING.md for the caveat about
# the repository-root config):
#   pre-commit install --config rust/.pre-commit-config.yaml

fail_fast: true

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: bash -c 'cd rust && cargo fmt --check'
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd rust && cargo clippy --all-targets -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        entry: bash -c 'cd rust && cargo test'
        language: system
        types: [rust]
        pass_filenames: false
